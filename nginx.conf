# Nginx конфиг для k4raga.ru + поддоменов
# Скопировать на сервер: /etc/nginx/sites-available/k4raga
# Затем: ln -s /etc/nginx/sites-available/k4raga /etc/nginx/sites-enabled/
# Затем: nginx -t && systemctl reload nginx

# ── k4raga.ru (main hub) ──────────────────────────────────────────────
server {
    listen 80;
    server_name illkiri02.fvds.ru;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

