name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/k4raga
            git pull origin main
            npm install
            rm -rf .next
            npm run build
            pm2 stop k4raga 2>/dev/null || true
            pm2 delete k4raga 2>/dev/null || true
            pm2 start ./node_modules/.bin/next --name k4raga -- start -p 3000
            pm2 save
            echo "Deploy done"
